<!DOCTYPE html>
<head>
    <title>Welcome to Rock, Paper Scissors: Go!</title>
    <link href="rps.css" rel="stylesheet">
</head>
<body>
    <div id="indexRootDiv">
        <h1>* * * ROCK, PAPER, SCISSORS: GO! * * *</h1>
                    <p id="blue-p">Welcome. This is a one-run gameplay space of rock, paper, scissors, go! <br />
                        Rules: to play select the move you want to make against the computer.
            </p>
        <div id="gameTable">
            <table id="baseItemsTable">
                <tbody>
                    <tr><td><h2>Player One</td><td><p></p></td><td><h2>Computer Player</td></tr>
                    <tr><td><h2>Level <span id="playerLevel">0</span></h2></td><td></td><td><h2>Level <span id="computerLevel">0</span></h2></td></tr>
                    <tr><td><h2><span id="playerPoints">0</span> XP</h2></td><td></td><td><h2><span id="computerPoints">0</span> XP</h2></td></tr>
                    <tr ><td><p></p></td><td><p id="results">.</p></td><td><p></p></td></tr>
                    <tr ></tr>
                    <tr ><td><p><button class="designedButton" type="input" onclick="clickRockButton()">Choose Rock</button></p></td>
                        <td><p></p><button class="designedButton" type="input" onclick="clickPaperButton()">Choose Paper</button></p></td>
                        <td><p></p><button class="designedButton" type="input" onclick="clickPaperButton()">Choose Scissors</button></p></td>
                    </tr>
                    <tr><td><p><button class="designedButton" type="input" onclick="clickJaggedRockButton()">Choose Jagged Rock</button></p></td>
                        <td><p><button class="designedButton" type="input" onclick="clickWadPaperButton()">Choose Wadded Paper</button></p></td>
                        <td><p><button class="designedButton" type="input" onclick="clickTitaniumScissorsButton()">Choose Titanium Scissors</button></p></td>
                    </tr>
                    <tr><td><p><button class="designedButton" type="input" onclick="clickWetRockButton()">Choose Wet Rock</button></p></td>
                        <td><p><button class="designedButton" type="input" onclick="clickFoldedPaperButton()">Choose Folded Paper</button></p></td>
                        <td><p><button class="designedButton" type="input" onclick="clickAirScissorsButton()">Choose Air Scissors</button></p></td>
                    </tr>
                    <tr><td></td>
                        <td><p><button class="designedButton" type="input" onclick="clickDiamondButton()">Choose Diamond</button></p></td>
                        <td></td></tr>
                </tbody></table>
        </div>
    </div>
    <script type="text/javascript" src="rps.js"></script>
</body>
